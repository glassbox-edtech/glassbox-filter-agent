<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Restricted - Glassbox</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f3f4f6; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 450px; width: 100%; text-align: center; }
        h1 { color: #dc2626; margin-top: 0; font-size: 1.5rem; }
        p { color: #4b5563; font-size: 0.95rem; line-height: 1.5; }
        input, textarea, button { width: 100%; margin-top: 1rem; padding: 0.75rem; border-radius: 6px; border: 1px solid #d1d5db; box-sizing: border-box; font-family: inherit; }
        button { background-color: #2563eb; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 1.5rem; }
        button:hover { background-color: #1d4ed8; }
        .success { color: #059669; display: none; margin-top: 1.5rem; font-weight: bold; background: #d1fae5; padding: 1rem; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Access Restricted</h1>
        <p>This website has been blocked by your school's network policy.</p>
        
        <form id="unblockForm">
            <input type="text" id="urlInput" placeholder="URL you were trying to visit (e.g., badsite.test)" required>
            <textarea id="reasonInput" rows="3" placeholder="Why do you need this site for your academic work?" required></textarea>
            <button type="submit">Submit Unblock Request</button>
        </form>
        
        <div id="statusMessage" class="success">✅ Request securely submitted to IT!</div>
    </div>

    <script src="block.js"></script>
</body>
</html>
